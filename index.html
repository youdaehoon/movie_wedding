<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta property="og:title" content="🎟 Movie Wedding Ticket" />
<meta property="og:description" content="영화 티켓이 도착하였습니다." />
<meta property="og:image" content="https://youdaehoon.github.io/movie_wedding/ticket_preview.png" />
<meta property="og:url" content="https://youdaehoon.github.io/movie_wedding/" />
<title>Ticket</title>

<style>
  body {
    margin: 0;
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }

  .ticket {
    width: 720px;
    height: 230px;
    background: #f8fafc;
    border-radius: 18px;
    display: flex;
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    overflow: hidden;
  }

  .left {
    flex: 3;
    padding: 22px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  .title {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 2px;
  }

  .sub {
    font-size: 12px;
    color: #666;
  }

  .info {
    display: flex;
    justify-content: space-between;
    margin-top: 10px;
  }

  .block {
    font-size: 13px;
  }

  .label {
    color: #888;
    font-size: 11px;
  }

  .value {
    font-weight: 600;
    margin-top: 3px;
  }

  .divider {
    width: 1px;
    background: repeating-linear-gradient(
      to bottom,
      #ccc,
      #ccc 6px,
      transparent 6px,
      transparent 12px
    );
  }

  .right {
    flex: 1.2;
    padding: 18px;
    text-align: center;
    position: relative;
  }

  .admit {
    font-size: 16px;
    font-weight: bold;
    margin-bottom: 10px;
  }

  .barcode {
    width: 100%;
    height: 50px;
    background: repeating-linear-gradient(
      to right,
      #000,
      #000 2px,
      transparent 2px,
      transparent 4px
    );
    margin-bottom: 10px;
  }

  .qr {
    width: 80px;
    margin: 0 auto 8px;
  }

  .code {
    font-size: 11px;
    letter-spacing: 2px;
  }

  .footer {
    font-size: 10px;
    color: #777;
    margin-top: 5px;
  }

  .hint {
    font-size: 10px;
    color: #999;
    margin-top: 6px;
  }

</style>
</head>

<body>

<div class="ticket">

  <div class="left">
    <div>
      <div class="title">🎬 WEDDING ANNIVERSARY</div>
      <div class="sub">Private Screening</div>
    </div>

    <div class="info">
      <div class="block">
        <div class="label">TIME</div>
        <div class="value">09:00 - 17:00</div>
      </div>

      <div class="block">
        <div class="label">LOCATION</div>
        <div class="value">EVERYWHERE</div>
      </div>

      <div class="block">
        <div class="label">SEAT</div>
        <div class="value">ALWAYS / TOGETHER</div>
      </div>
    </div>
  </div>

  <div class="divider"></div>

  <div class="right">
    <div class="admit">ADMIT ONE</div>

    <!-- QR 코드 -->
    <img 
      class="qr" 
        src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://youdaehoon.github.io/movie_wedding/first_scene"
        alt="QR Code"

    />

    <div class="barcode"></div>
    <div class="code">1234 5678 9012</div>

    <div class="hint">scan at the end</div>
    <div class="footer">Valid for one unforgettable day</div>
  </div>

</div>

</body>
</html>
